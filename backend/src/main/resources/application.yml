# ===================================================================
# MEDISTOCK - SPRING BOOT & SUPABASE DATABASE JDBC CONNECTIVITY CONFIG
# ===================================================================

spring:
  # 1. JDBC DATABASE CONFIGURATION (SUPABASE POSTGRESQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.zjdmdnqbpyczncfkqhws}
    password: ${SPRING_DATASOURCE_PASSWORD:Luffy@1234.5}
    driver-class-name: org.postgresql.Driver

    # 2. HIKARI CONNECTION POOL (PERFORMANCE OPTIMIZATION)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # 3. SPRING DATA JPA & HIBERNATE SETTINGS
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 6. FILE UPLOADS (For Medicine Prescription/Image Attachments)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# 4. SYSTEM PORT & API ROUTE CONFIGURATION
server:
  port: 8080

# 5. SECURITY & JWT (JSON WEB TOKEN) SETTINGS
jwt:
  secret: ${JWT_SECRET:your_super_secret_clinical_medistock_jwt_signing_key_32_characters_minimum}
  expiration: ${JWT_EXPIRATION_MS:86400000}

# Logging configuration for debugging
logging:
  level:
    org.hibernate.orm.results.loading: DEBUG
